<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Nivelamento de Inglês - Caroline Alves</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h1>Formulário de Nivelamento de Inglês</h1>
            <p class="subtitle">Olá 👋</p>
            <p class="description">Para que eu possa preparar aulas mais personalizadas para você, responda este pequeno formulário de nivelamento e interesses.</p>
        </div>

        <form id="englishForm" class="form-wrapper">
            <!-- Campo de Nome -->
            <div class="form-group">
                <label for="nome" class="label-required">Qual é seu nome?</label>
                <input
                    type="text"
                    id="nome"
                    name="nome"
                    placeholder="Seu nome completo"
                    required
                    class="input-field"
                >
                <span class="error-message" id="nomeError"></span>
            </div>

            <!-- Campo de Email -->
            <div class="form-group">
                <label for="email" class="label-required">E-mail</label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    placeholder="seu.email@exemplo.com"
                    required
                    class="input-field"
                >
                <span class="error-message" id="emailError"></span>
            </div>

            <!-- Nível de Inglês -->
            <div class="form-group">
                <label class="label-required">Como você consideraria seu atual nível de inglês?</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="nivel" value="Iniciante" required>
                        <span>Iniciante</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="nivel" value="Intermediário">
                        <span>Intermediário</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="nivel" value="Fluente">
                        <span>Fluente</span>
                    </label>
                </div>
            </div>

            <!-- Forma de Aprender -->
            <div class="form-group">
                <label class="label-required">Tem maior facilidade/preferência de aprender de qual forma?</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="forma_aprender" value="Audiolivro">
                        <span>Audiolivro</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="forma_aprender" value="Ouvindo">
                        <span>Ouvindo</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="forma_aprender" value="Falando">
                        <span>Falando</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="forma_aprender" value="Escrevendo">
                        <span>Escrevendo</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" name="forma_aprender" value="Ainda não sei">
                        <span>Ainda não sei</span>
                    </label>
                </div>
            </div>

            <!-- Assuntos de Interesse -->
            <div class="form-group">
                <label class="label-required">Quais desses assuntos você gosta? (Pode escolher mais de um)</label>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="assuntos" value="Animais">
                        <span>Animais</span>
                    </label>
                    <label class="checkbox-label">
